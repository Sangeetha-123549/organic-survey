<!DOCTYPE html>
<html>
<head>
  <title>Survey Form</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="glass">

<h2>🌱 Organic Farming Survey</h2>

<form id="surveyForm">

<label>1. Age Group</label>
<select name="q1">
  <option>18-25</option>
  <option>26-40</option>
  <option>40-60</option>
  <option>60+</option>
</select>

<label>2. Occupation</label>
<select name="q2">
  <option>Farmer</option>
  <option>Student</option>
  <option>Business</option>
</select>

<label>3. Land Size</label>
<select name="q3">
  <option>Below 1 acre</option>
  <option>1-5 acres</option>
  <option>5+ acres</option>
</select>

<label>4. Farming Experience</label>
<select name="q4">
  <option>20-40 years</option>
  <option>40-60years</option>
  <option>60+ years</option>
</select>

<label>5. Main Crop</label>
<select name="q5">
  <option>Rice</option>
  <option>Vegetables</option>
  <option>Wheat</option>
  <option>sugarcane</option>
  <option>millets</option>
  <option>groundnuts</option>
</select>

<label>6. Do you practice organic farming?</label>
<select name="q6">
  <option>Yes</option>
  <option>No</option>
</select>

<label>7. Use chemical fertilizers?</label>
<select name="q7">
  <option>Yes</option>
  <option>No</option>
</select>

<label>8. Use organic fertilizers?</label>
<select name="q8">
  <option>Yes</option>
  <option>No</option>
</select>

<label>9. Use pesticides?</label>
<select name="q9">
  <option>Yes</option>
  <option>No</option>
</select>

<label>10. Awareness level</label>
<select name="q10">
  <option>High</option>
  <option>Medium</option>
  <option>Low</option>
</select>

<br><br>

<button class="btn" type="submit">Submit</button>

</form>

</div>

<script src="script.js"></script>
</body>
</html>
